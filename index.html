<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Bestie Chahd</title>
    <style>
        :root {
            --goofy-yellow: #f1c40f;
            --goofy-orange: #e67e22;
            --goofy-blue: #3498db;
            --goofy-green: #2ecc71;
            --white-soft: #fdfdfd;
            --text-color: #2c3e50;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Comic Sans MS', 'Segoe UI', cursive, sans-serif;
            overflow: hidden;
            background-color: var(--goofy-yellow);
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }

        #intro-screen { background-color: var(--goofy-green); z-index: 40; }
        #main-content-screen { background: linear-gradient(45deg, var(--goofy-yellow) 0%, var(--goofy-orange) 100%); z-index: 30; }

        .btn-style {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: var(--goofy-blue);
            color: white;
            border: 4px solid #2980b9;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.2);
            transition: 0.2s;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-style:hover { 
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px rgba(0,0,0,0.2);
        }
        
        .btn-style:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px rgba(0,0,0,0.2);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            margin: 20px;
            border-radius: 20px;
            border: 8px solid var(--goofy-blue);
            color: var(--text-color);
            max-width: 600px;
            text-align: center;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.1);
            max-height: 85vh;
            overflow-y: auto;
        }

        .content-text {
            font-size: 1.3rem;
            line-height: 1.6;
            color: var(--text-color);
            text-align: left;
            margin-bottom: 20px;
        }

        .slide-up { transform: translateY(-100%); }

        #success-content {
            display: none;
            text-align: center;
        }

        .birthday-img {
            width: 250px;
            max-width: 80%;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 5px solid var(--goofy-orange);
            transform: rotate(-3deg);
        }

        .final-msg {
            font-size: 2rem;
            font-weight: bold;
            color: var(--goofy-orange);
            text-shadow: 2px 2px 0px #fff;
        }
        
        h1 {
            font-size: 2.8rem;
            text-shadow: 3px 3px 0px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

    <audio id="music1" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <canvas id="confetti-canvas"></canvas>

    <!-- Page 1 -->
    <div id="intro-screen" class="screen">
        <div style="text-align: center;">
            <h1 style="color: white; margin-bottom: 10px;">Happy Birthday bestiee! 🎂</h1>
            <p style="color: white; font-size: 1.5rem;">Click below if you dare...</p>
            <button class="btn-style" onclick="startExperience()">OPEN SURPRISE 🎉</button>
        </div>
    </div>

    <!-- Page 2 -->
    <div id="main-content-screen" class="screen">
        <div class="glass-card">
            <div id="letter-content">
                <h1 style="font-size: 3rem; margin-bottom: 15px;">✨</h1>
                <div class="content-text">
                    <p>Happy Birthday my bestie!</p>
                    <p>You are very kind, funny, and vibing girl I’ve met. You really are the best bestie. Thank you for just being <b>you</b>. Thank you for always being there for me as my best friend, my bff.</p>
                </div>

                <div style="display: flex; justify-content: center;">
                    <button class="btn-style" onclick="celebrate()">NEXT! ✨</button>
                </div>
            </div>

            <!-- Page 3 -->
            <div id="success-content">
                <img src="birthday.jpg" alt="Birthday Surprise" class="birthday-img">
                <div class="final-msg">YOU'RE STUCK WITH ME! 🎉</div>
            </div>
        </div>
    </div>

    <script>
        const music = document.getElementById('music1');

        function startExperience() {
            music.play();
            nextPage('intro-screen');
        }

        function nextPage(currentId) {
            document.getElementById(currentId).classList.add('slide-up');
            if(currentId === 'intro-screen') {
                for(let i = 0; i < 15; i++) particles.push(new Confetti(true));
            }
        }

        function celebrate() {
            document.getElementById('letter-content').style.display = 'none';
            document.getElementById('success-content').style.display = 'block';
            for(let i = 0; i < 30; i++) particles.push(new Confetti(true));
        }

        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const colors = ['#f1c40f', '#e67e22', '#3498db', '#2ecc71', '#e74c3c', '#9b59b6'];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Confetti {
            constructor(isBurst = false) { 
                this.reset(isBurst); 
                if(!isBurst) this.y = Math.random() * canvas.height; 
            }
            reset(isBurst) {
                this.x = isBurst ? canvas.width / 2 : Math.random() * canvas.width;
                this.y = isBurst ? canvas.height / 2 : -20;
                this.w = Math.random() * 10 + 5;
                this.h = Math.random() * 10 + 5;
                this.vY = isBurst ? (Math.random() * 12 - 6) : (Math.random() * 2 + 1);
                this.vX = isBurst ? (Math.random() * 12 - 6) : (Math.random() * 2 - 1);
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 10 - 5;
                this.opacity = 1;
                this.isBurst = isBurst;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
                ctx.restore();
            }
            update() {
                this.y += this.vY;
                this.x += this.vX;
                this.angle += this.spin;
                if(this.isBurst) {
                    this.vY += 0.2; 
                    this.opacity -= 0.02; 
                }
            }
        }

        // Minimal constant background confetti
        for (let i = 0; i < 15; i++) particles.push(new Confetti(false));

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Iterate backwards to safely handle element removal
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                
                // Check removal conditions
                if (p.y > canvas.height + 20 || (p.isBurst && p.opacity <= 0)) {
                    if (p.isBurst) {
                        particles.splice(i, 1);
                        continue; // Skip drawing this frame
                    } else {
                        p.reset(false);
                    }
                }
                
                p.draw();
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
